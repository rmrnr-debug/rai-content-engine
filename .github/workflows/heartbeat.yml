name: Run Heartbeat

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Call Heartbeat API
        run: |
          echo "Calling heartbeat..."
          curl -s https://rai-content-engine.vercel.app/api/heartbeat | tee response.json

      - name: Show response
        run: |
          cat response.json
